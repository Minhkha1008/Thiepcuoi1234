<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8/3 Memory Galaxy</title>
    <link rel="stylesheet" href="vutru.css">
</head>

<body>
    <canvas class="webgl"></canvas>
    <div class="preview" id="preview">
        <button class="preview-close" id="previewClose" type="button">Close</button>
        <img class="preview-image" id="previewImage" alt="Selected particle image">
        <div class="preview-title" id="previewTitle"></div>
    </div>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-panel">
            <div class="loading-title">March 8 Galaxy</div>
            <div class="loading-subtitle" id="loadingHint">Đang thắp sao cho ngày 8/3...</div>
            <div class="loading-quote" id="loadingQuote">"Chúc em 8/3 dịu dàng như một dải ngân hà."</div>
            <div class="loading-bar">
                <div class="loading-fill" id="loadingFill"></div>
            </div>
            <div class="loading-meta">
                <span>Loving Assets</span>
                <span id="loadingPercent">0%</span>
            </div>
        </div>
    </div>
    <button class="music-toggle" id="musicToggle" type="button">Music: Off</button>
    <script type="module" src="vutru.js"></script>
</body>

</html>
